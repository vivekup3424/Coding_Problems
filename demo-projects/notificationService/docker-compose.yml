version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: notification-service-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=notification-service
    volumes:
      - mongodb_data:/data/db
    networks:
      - notification-network

  mongo-express:
    image: mongo-express:latest
    container_name: notification-service-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - notification-network

volumes:
  mongodb_data:

networks:
  notification-network:
    driver: bridge
